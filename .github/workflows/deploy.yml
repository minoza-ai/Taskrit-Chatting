name: Build and Deploy Chat Service

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/taskrit-chatting
  CONTAINER_NAME: taskrit-chatting
  CONTAINER_PORT: 3001

jobs:
  generate-openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate openapi.json
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          root = Path('.').resolve()
          sys.path.insert(0, str(root / 'python'))

          from app.main import app

          with open(root / 'openapi.json', 'w', encoding='utf-8') as f:
              json.dump(app.openapi(), f, ensure_ascii=False, indent=2)
          PY

      - name: Commit openapi.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.json
          git diff --cached --quiet && echo "No OpenAPI changes" && exit 0
          git commit -m "chore: update chat openapi spec"
          git push

  build-and-push:
    runs-on: ubuntu-latest
    needs: generate-openapi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing required secret: SSH_PRIVATE_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "::error::Missing required secret: SSH_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PORT }}" ]; then
            echo "::error::Missing required secret: SSH_PORT"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "::error::Missing required secret: SSH_USER"
            exit 1
          fi
          if [ -z "${{ secrets.GHCR_USERNAME }}" ]; then
            echo "::error::Missing required secret: GHCR_USERNAME"
            exit 1
          fi
          if [ -z "${{ secrets.GHCR_PAT }}" ]; then
            echo "::error::Missing required secret: GHCR_PAT"
            exit 1
          fi
          if [ -z "${{ secrets.CHAT_SERVER_PORT }}" ]; then
            echo "::error::Missing required secret: CHAT_SERVER_PORT"
            exit 1
          fi
          if [ -z "${{ secrets.CHAT_MONGODB_URI_PROD }}" ]; then
            echo "::error::Missing required secret: CHAT_MONGODB_URI_PROD"
            exit 1
          fi
          if [ -z "${{ secrets.CHAT_MONGODB_DB_PROD }}" ]; then
            echo "::error::Missing required secret: CHAT_MONGODB_DB_PROD"
            exit 1
          fi
          if [ -z "${{ secrets.CHAT_USER_API_BASE_URL_PROD }}" ]; then
            echo "::error::Missing required secret: CHAT_USER_API_BASE_URL_PROD"
            exit 1
          fi

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          timeout 15s ssh-keyscan -T 5 -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
            set -e
            docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" -p "${{ secrets.GHCR_PAT }}"
            docker pull "${{ env.IMAGE_NAME }}:latest"

            docker network create "taskrit-network" || true

            docker stop "${{ env.CONTAINER_NAME }}" || true
            docker rm "${{ env.CONTAINER_NAME }}" || true

            docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --network "taskrit-network" \
              --restart unless-stopped \
              -e NODE_ENV=production \
              -e MONGODB_URI_PROD="${{ secrets.CHAT_MONGODB_URI_PROD }}" \
              -e MONGODB_DB_PROD="${{ secrets.CHAT_MONGODB_DB_PROD }}" \
              -e USER_API_BASE_URL_PROD="${{ secrets.CHAT_USER_API_BASE_URL_PROD }}" \
              -p "${{ secrets.CHAT_SERVER_PORT }}:${{ env.CONTAINER_PORT }}" \
              "${{ env.IMAGE_NAME }}:latest"
          EOF
