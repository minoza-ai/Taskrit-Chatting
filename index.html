<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Taskrit Chat API Tester</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; flex-direction: column; background-color: #f4f7f6; }
        #header { padding: 15px 20px; background-color: #2c3e50; color: white; display: flex; justify-content: space-between; align-items: center; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 300px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; overflow-y: auto; }
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        
        .section { padding: 15px; border-bottom: 1px solid #eee; }
        h3 { margin-top: 0; font-size: 16px; color: #333; }
        
        .btn { padding: 8px 12px; border: none; background: #3498db; color: white; border-radius: 4px; cursor: pointer; font-size: 13px; margin: 2px 0; }
        .btn:hover { background: #2980b9; }
        .btn-small { padding: 4px 8px; font-size: 11px; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        
        .list-item { padding: 10px; border-bottom: 1px solid #f1f1f1; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .list-item:hover { background-color: #f9f9f9; }
        .active-room { background-color: #ebf5fb; font-weight: bold; }
        
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 70%; }
        .message-wrapper.mine { align-self: flex-end; }
        .message-wrapper.others { align-self: flex-start; }
        
        .message-sender { font-size: 12px; color: #555; margin-bottom: 2px; }
        .message-bubble { padding: 10px 14px; border-radius: 15px; position: relative; word-break: break-word; line-height: 1.4; }
        .mine .message-bubble { background: #dcf8c6; border-top-right-radius: 0; }
        .others .message-bubble { background: #fff; border-top-left-radius: 0; }
        .deleted .message-bubble { background: #f2dede; color: #a94442; font-style: italic; }
        
        .message-meta { display: flex; gap: 8px; font-size: 11px; color: #888; margin-top: 4px; align-items: center; justify-content: flex-end; }
        .mine .message-meta { justify-content: flex-end; }
        .others .message-meta { justify-content: flex-start; }
        
        #input-area { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; }
        #messageInput { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #fileInput { display: none; }
        .file-label { cursor: pointer; background: #95a5a6; color: white; padding: 10px 15px; border-radius: 20px; font-size: 13px; margin:0; }
        .file-label:hover { background: #7f8c8d; }
        
        select { padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
        
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); align-items:center; justify-content:center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 300px; }
        .modal-content h3 { margin-bottom: 15px; }
        .modal-content label { display: block; margin-bottom: 5px; cursor: pointer; }
        .modal-content .checkbox-list { max-height: 150px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #eee; padding: 10px; background: #fafafa; }
    </style>
</head>
<body>

<div id="header">
    <h2>Taskrit Chat Tester</h2>
    <div>
        <label for="userSelect">현재 로그인 사용자: </label>
        <select id="userSelect" onchange="changeUser()"></select>
    </div>
</div>

<div id="main">
    <div id="sidebar">
        <div class="section">
            <h3>모든 사용자 (1:1 DM)</h3>
            <div id="usersList"></div>
        </div>
        <div class="section">
            <h3>방 만들기</h3>
            <button class="btn" style="width:100%" onclick="openTeamModal()">팀 채팅방 생성</button>
        </div>
        <div class="section" style="flex: 1; overflow-y: auto;">
            <h3>내 채팅방 목록</h3>
            <div id="roomsList"></div>
        </div>
    </div>
    
    <div id="chat-area">
        <div id="chat-header" style="padding: 15px; background: #fff; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3 id="roomTitle" style="margin:0;">채팅방을 선택하세요</h3>
                <div id="roomInfo" style="font-size: 12px; color: #777; margin-top: 5px;"></div>
            </div>
            <div id="roomActions" style="display: none;">
                <button class="btn" onclick="openCreateTeamFromRoomModal()">이 방 멤버로 새 팀방 생성</button>
            </div>
        </div>
        
        <div id="messages">
            <div style="text-align:center; color:#888; margin-top:50px;">방을 선택하거나 생성하여 채팅을 시작하세요.</div>
        </div>
        
        <div id="input-area" style="display:none;">
            <label for="fileInput" class="file-label">📎 파일</label>
            <input type="file" id="fileInput" onchange="sendFile()">
            <input type="text" id="messageInput" placeholder="메시지를 입력하세요 (Enter 전송)" onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn" onclick="sendMessage()" style="border-radius:20px; padding:10px 20px;">전송</button>
        </div>
    </div>
</div>

<!-- Team Room Modal -->
<div id="teamModal" class="modal">
    <div class="modal-content">
        <h3>팀 채팅방 생성</h3>
        <input type="text" id="teamRoomName" placeholder="방 제목 입력" style="width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box;">
        <label>멤버 선택:</label>
        <div id="teamMembersList" class="checkbox-list"></div>
        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <button class="btn" onclick="closeModal('teamModal')" style="background: #95a5a6;">취소</button>
            <button class="btn" onclick="createTeamRoom()">생성</button>
        </div>
    </div>
</div>

<!-- Team From Room Modal -->
<div id="teamFromRoomModal" class="modal">
    <div class="modal-content">
        <h3>현재 방에서 새 팀방 생성</h3>
        <p style="font-size:12px; color:#555; margin-bottom: 10px;">기존 멤버는 자동으로 포함됩니다.</p>
        <input type="text" id="newTeamRoomName" placeholder="새 방 제목 입력" style="width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box;">
        <label>추가 멤버 선택 (선택):</label>
        <div id="extraMembersList" class="checkbox-list"></div>
        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <button class="btn" onclick="closeModal('teamFromRoomModal')" style="background: #95a5a6;">취소</button>
            <button class="btn" onclick="createTeamFromRoom()">생성</button>
        </div>
    </div>
</div>

<script>
    let allUsers = [];
    let currentUser = null;
    let currentRoom = null;
    let readTimer = null;
    let listRefreshTimer = null;
    let lastReadMsgId = null;

    // 초기 로딩
    async function init() {
        const res = await fetch("/users");
        allUsers = await res.json();
        
        const userSelect = document.getElementById("userSelect");
        allUsers.forEach(u => {
            const opt = document.createElement("option");
            opt.value = u.user_uuid;
            opt.innerText = `${u.nickname} (${u.user_id})`;
            userSelect.appendChild(opt);
        });
        
        if(allUsers.length > 0) {
            currentUser = allUsers[0].user_uuid;
            updateUI();
        }
        
        if(listRefreshTimer) clearInterval(listRefreshTimer);
        listRefreshTimer = setInterval(loadMyRooms, 3000);
    }

    function changeUser() {
        currentUser = document.getElementById("userSelect").value;
        currentRoom = null;
        document.getElementById("chat-area").querySelector("#messages").innerHTML = '<div style="text-align:center; color:#888; margin-top:50px;">방을 선택하거나 생성하여 채팅을 시작하세요.</div>';
        document.getElementById("chat-header").querySelector("#roomTitle").innerText = "채팅방을 선택하세요";
        document.getElementById("roomInfo").innerText = "";
        document.getElementById("input-area").style.display = "none";
        document.getElementById("roomActions").style.display = "none";
        
        if(readTimer) { clearInterval(readTimer); readTimer = null; }
        updateUI();
    }

    function updateUI() {
        renderUsersList();
        loadMyRooms();
    }

    function getUserName(uuid) {
        const u = allUsers.find(x => x.user_uuid === uuid);
        return u ? u.nickname : uuid.substring(0,6);
    }

    function renderUsersList() {
        const div = document.getElementById("usersList");
        div.innerHTML = "";
        allUsers.forEach(u => {
            if(u.user_uuid === currentUser) return;
            
            const item = document.createElement("div");
            item.className = "list-item";
            item.innerHTML = `
                <span>${u.nickname}</span>
                <button class="btn btn-small" onclick="createDM('${u.user_uuid}')">1:1</button>
            `;
            div.appendChild(item);
        });
    }

    async function loadMyRooms() {
        if(!currentUser) return;
        const res = await fetch(`/users/${currentUser}/rooms`);
        const rooms = await res.json();
        
        const div = document.getElementById("roomsList");
        div.innerHTML = "";
        
        if(rooms.length === 0) {
            div.innerHTML = "<div style='padding:10px; color:#888; font-size:13px;'>참여중인 방이 없습니다.</div>";
            return;
        }

        rooms.forEach(r => {
            const item = document.createElement("div");
            item.className = "list-item" + (currentRoom && currentRoom.room_id === r.room_id ? " active-room" : "");
            
            let displayName = r.room_name;
            if(r.room_type === "dm") {
                const otherUUid = r.members.find(m => m !== currentUser);
                displayName = `${r.room_name} (with ${getUserName(otherUUid)})`;
            } else {
                displayName = `${r.room_name} (${r.members.length}명)`;
            }

            item.innerHTML = `<span>${displayName}</span>`;
            item.onclick = () => selectRoom(r);
            div.appendChild(item);
        });
    }

    async function createDM(targetUuid) {
        const roomName = prompt("1:1 채팅방 이름을 입력하세요:", "새로운 대화방");
        if (roomName === null || roomName.trim() === "") return;

        const res = await fetch("/dm/rooms", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                room_name: roomName.trim(),
                user1_uuid: currentUser,
                user2_uuid: targetUuid
            })
        });
        const room = await res.json();
        if(room.error) {
            alert(room.error);
            return;
        }
        await loadMyRooms();
        selectRoom(room);
    }

    function openTeamModal() {
        document.getElementById("teamRoomName").value = "";
        const list = document.getElementById("teamMembersList");
        list.innerHTML = "";
        
        allUsers.forEach(u => {
            if(u.user_uuid === currentUser) return;
            const label = document.createElement("label");
            label.innerHTML = `<input type="checkbox" value="${u.user_uuid}"> ${u.nickname}`;
            list.appendChild(label);
        });
        
        document.getElementById("teamModal").style.display = "flex";
    }

    async function createTeamRoom() {
        const name = document.getElementById("teamRoomName").value;
        if(!name) { alert("방 제목을 입력하세요."); return; }
        
        const checkboxes = document.querySelectorAll("#teamMembersList input:checked");
        const members = [currentUser];
        checkboxes.forEach(cb => members.push(cb.value));
        
        if(members.length < 2) { alert("본인 외에 최소 1명을 선택해야 합니다."); return; }

        const res = await fetch("/team/rooms", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                room_name: name,
                creator_uuid: currentUser,
                members: members
            })
        });
        
        const room = await res.json();
        if(room.error) { alert(room.error); return; }
        
        closeModal('teamModal');
        await loadMyRooms();
        selectRoom(room);
    }
    
    function openCreateTeamFromRoomModal() {
        if(!currentRoom) return;
        
        document.getElementById("newTeamRoomName").value = "";
        const list = document.getElementById("extraMembersList");
        list.innerHTML = "";
        
        let existingMembers = currentRoom.members;
        
        allUsers.forEach(u => {
            if(existingMembers.includes(u.user_uuid)) return;
            const label = document.createElement("label");
            label.innerHTML = `<input type="checkbox" value="${u.user_uuid}"> ${u.nickname}`;
            list.appendChild(label);
        });
        
        if(list.children.length === 0) {
            list.innerHTML = "<div style='font-size:12px;color:#888;'>초대할 수 있는 추가 멤버가 없습니다. 기존 멤버로만 방을 생성합니다.</div>";
        }
        
        document.getElementById("teamFromRoomModal").style.display = "flex";
    }
    
    async function createTeamFromRoom() {
        const name = document.getElementById("newTeamRoomName").value;
        if(!name) { alert("새 방 제목을 입력하세요."); return; }
        
        const checkboxes = document.querySelectorAll("#extraMembersList input:checked");
        const newMembers = [];
        checkboxes.forEach(cb => newMembers.push(cb.value));
        
        const res = await fetch(`/rooms/${currentRoom.room_id}/team`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                room_name: name,
                creator_uuid: currentUser,
                new_members: newMembers
            })
        });
        
        const room = await res.json();
        if(room.error) { alert(room.error); return; }
        
        closeModal('teamFromRoomModal');
        await loadMyRooms();
        selectRoom(room);
    }

    function closeModal(id) {
        document.getElementById(id).style.display = "none";
    }

    function selectRoom(room) {
        currentRoom = room;
        
        let displayName = room.room_name;
        if(room.room_type === "dm") {
            const otherUUid = room.members.find(m => m !== currentUser);
            displayName = `${room.room_name} (with ${getUserName(otherUUid)})`;
        }
        
        document.getElementById("roomTitle").innerText = displayName;
        
        const memberNames = room.members.map(uuid => getUserName(uuid)).join(", ");
        document.getElementById("roomInfo").innerText = `멤버: ${memberNames}`;
        
        document.getElementById("input-area").style.display = "flex";
        document.getElementById("roomActions").style.display = "block";
        
        loadMyRooms(); // Active 표시 갱신
        loadMessages(true); // 방 선택시 무조건 아래로 스크롤
        
        if(readTimer) clearInterval(readTimer);
        readTimer = setInterval(loadMessages, 1000);
    }

    async function loadMessages(forceScrollBottom = false) {
        if(!currentRoom) return;
        
        const res = await fetch(`/rooms/${currentRoom.room_id}/messages?limit=100`);
        const messages = await res.json();
        if(messages.error) return; 
        
        // MVP의 단순한 안읽음 방식 우회를 위해 생략 가능.
        
        const div = document.getElementById("messages");
        
        const isScrolledToBottom = (div.scrollHeight - div.clientHeight <= div.scrollTop + 20) || forceScrollBottom;
        
        div.innerHTML = "";
        let latestMsgId = null;

        messages.forEach(m => {
            latestMsgId = m.message_id;
            
            const isMine = m.sender_uuid === currentUser;
            const w = document.createElement("div");
            w.className = "message-wrapper " + (isMine ? "mine" : "others") + (m.is_deleted ? " deleted" : "");
            
            const timeStr = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
            
            let contentHtml = "";
            let textContent = m.text || "";
            // XSS 방지를 위한 텍스트 안전화
            textContent = textContent.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            if(m.is_deleted) {
                contentHtml = `삭제된 메시지입니다.`;
            } else if(m.message_type === "file") {
                contentHtml = `📁 <a href="${m.file_url}" target="_blank" style="color:#0056b3; font-weight:bold; text-decoration:none;">${textContent} 다운로드</a>`;
            } else {
                contentHtml = textContent;
            }
            
            w.innerHTML = `
                ${!isMine ? `<div class="message-sender">${getUserName(m.sender_uuid)}</div>` : ''}
                <div class="message-bubble">${contentHtml}</div>
                <div class="message-meta">
                    ${isMine && !m.is_deleted ? `<button class="btn btn-small btn-danger" style="padding:2px 5px; font-size:10px;" onclick="deleteMessage('${m.message_id}')">삭제</button>` : ''}
                    <span>${timeStr}</span>
                </div>
            `;
            div.appendChild(w);
        });
        
        if (isScrolledToBottom) {
            div.scrollTop = div.scrollHeight;
        }
        
        if(latestMsgId && latestMsgId !== lastReadMsgId) {
            lastReadMsgId = latestMsgId;
            updateReadStatus(latestMsgId);
        }
    }

    async function updateReadStatus(msgId) {
        if(!currentRoom || !msgId) return;
        await fetch(`/rooms/${currentRoom.room_id}/read`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                user_uuid: currentUser,
                last_read_message_id: msgId
            })
        });
    }

    async function sendMessage() {
        if(!currentRoom) return;
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if(!text) return;
        
        input.value = "";
        
        await fetch(`/rooms/${currentRoom.room_id}/messages`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                sender_uuid: currentUser,
                text: text
            })
        });
        
        loadMessages(true);
    }

    async function sendFile() {
        if(!currentRoom) return;
        const fileInput = document.getElementById("fileInput");
        const file = fileInput.files[0];
        if(!file) return;
        
        const form = new FormData();
        form.append("file", file);
        form.append("sender_uuid", currentUser);
        
        // 초기화
        fileInput.value = ""; 
        
        await fetch(`/rooms/${currentRoom.room_id}/files`, {
            method: "POST",
            body: form
        });
        
        loadMessages(true);
    }

    async function deleteMessage(id) {
        if(!confirm("해당 메시지를 삭제하시겠습니까?")) return;
        await fetch(`/messages/${id}`, {
            method: "DELETE",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ requester_uuid: currentUser })
        });
        loadMessages();
    }

    window.onload = init;
</script>

</body>
</html>
