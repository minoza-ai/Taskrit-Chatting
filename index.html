<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskrit 1대1 채팅</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .topbar {
      background: #007bff;
      color: white;
      padding: 16px 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      height: calc(100vh - 58px);
    }

    .left-panel {
      width: 35%;
      background: white;
      border-right: 1px solid #ddd;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .right-panel {
      width: 65%;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      background: #fafafa;
    }

    h2 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .user-card {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .user-name {
      font-weight: bold;
      flex: 1;
    }

    .user-card button {
      width: 140px;
      margin-top: 0;
      flex-shrink: 0;
    }

    .empty-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #777;
      font-size: 20px;
      background: white;
      border: 1px dashed #ccc;
      border-radius: 10px;
    }

    .chat-area {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .chat-header {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .messages-box {
      flex: 1;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      overflow-y: auto;
      margin-bottom: 15px;
    }

    .message-item {
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      max-width: 70%;
      word-break: break-word;
    }

    .message-mine {
      background: #dbeafe;
      margin-left: auto;
      text-align: right;
    }

    .message-other {
      background: #eeeeee;
      margin-right: auto;
      text-align: left;
    }

    .message-sender {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .message-time {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-row textarea {
      flex: 1;
      resize: none;
      height: 70px;
    }

    .input-row button {
      width: 120px;
    }

    .status-text {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }

      .left-panel, .right-panel {
        width: 100%;
        height: auto;
      }

      .empty-chat {
        min-height: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">Taskrit 1대1 채팅</div>

  <div class="container">
    <!-- 왼쪽 -->
    <div class="left-panel">
      <h2>사용자 목록</h2>

      <label for="myId">내 아이디</label>
      <input type="text" id="myId" placeholder="예: me" />

      <div id="userList" style="margin-top:20px;"></div>
    </div>

    <!-- 오른쪽 -->
    <div class="right-panel">
      <!-- 처음에는 빈 화면 -->
      <div id="emptyChat" class="empty-chat">
        왼쪽에서 1대1 채팅방을 선택해주세요
      </div>

      <!-- 버튼 누른 뒤에만 보이는 채팅창 -->
      <div id="chatArea" class="chat-area">
        <div class="chat-header" id="chatHeader"></div>

        <div class="messages-box" id="messagesBox"></div>

        <div class="input-row">
          <textarea id="messageText" placeholder="메시지를 입력하세요"></textarea>
          <button onclick="sendMessage()">보내기</button>
        </div>

        <div class="status-text" id="statusText">준비됨</div>
      </div>
    </div>
  </div>

  <script>
    let currentRoomId = null;
    let currentOtherUser = null;

    async function loadUsers() {
      const userList = document.getElementById("userList");
      userList.innerHTML = "";

      try {
        const response = await fetch("/users");
        const users = await response.json();

        users.forEach(user => {
          userList.innerHTML += `
            <div class="user-card">
              <div class="user-name">사용자 ${user}</div>
              <button onclick="createRoomWith('${user}')">1대1 채팅하기</button>
            </div>
          `;
        });
      } catch (error) {
        userList.innerHTML = "사용자 목록을 불러오지 못했습니다.";
        console.error(error);
      }
    }

    async function createRoomWith(otherUser) {
      const myId = document.getElementById("myId").value.trim();
      const statusText = document.getElementById("statusText");

      if (!myId) {
        alert("먼저 내 아이디를 입력해주세요.");
        return;
      }

      if (myId === otherUser) {
        alert("자기 자신과는 채팅할 수 없습니다.");
        return;
      }

      try {
        const response = await fetch("/dm/rooms", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user1_id: myId,
            user2_id: otherUser
          })
        });

        const data = await response.json();

        if (data.error) {
          statusText.textContent = data.error;
          return;
        }

        currentRoomId = data.room_id;
        currentOtherUser = otherUser;

        // 버튼 누르기 전에는 빈 화면
        // 버튼 누르면 채팅창 보이게 변경
        document.getElementById("emptyChat").style.display = "none";
        document.getElementById("chatArea").style.display = "flex";

        document.getElementById("chatHeader").innerText = `${otherUser} 와의 1대1 채팅방`;

        document.getElementById("messagesBox").innerHTML = "";
        document.getElementById("statusText").textContent = `${otherUser}님과의 채팅방이 생성되었습니다.`;

        loadMessages();
      } catch (error) {
        console.error(error);
        document.getElementById("statusText").textContent = "채팅방 생성 실패";
      }
    }

    async function sendMessage() {
      const myId = document.getElementById("myId").value.trim();
      const text = document.getElementById("messageText").value.trim();
      const statusText = document.getElementById("statusText");

      if (!currentRoomId) {
        alert("먼저 채팅방을 선택해주세요.");
        return;
      }

      if (!myId) {
        alert("내 아이디를 입력해주세요.");
        return;
      }

      if (!text) {
        alert("메시지를 입력해주세요.");
        return;
      }

      try {
        const response = await fetch(`/rooms/${currentRoomId}/messages`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            sender_id: myId,
            text: text
          })
        });

        const data = await response.json();

        if (data.error) {
          statusText.textContent = data.error;
          return;
        }

        document.getElementById("messageText").value = "";
        statusText.textContent = "메시지 전송 완료";

        loadMessages();
      } catch (error) {
        console.error(error);
        statusText.textContent = "메시지 전송 실패";
      }
    }

    async function loadMessages() {
      const myId = document.getElementById("myId").value.trim();
      const messagesBox = document.getElementById("messagesBox");
      const statusText = document.getElementById("statusText");

      if (!currentRoomId) {
        return;
      }

      try {
        const response = await fetch(`/rooms/${currentRoomId}/messages`);
        const data = await response.json();

        if (data.error) {
          messagesBox.innerHTML = data.error;
          return;
        }

        if (data.length === 0) {
          messagesBox.innerHTML = "아직 메시지가 없습니다.";
          return;
        }

        messagesBox.innerHTML = "";

        data.forEach(msg => {
          const mine = msg.sender_id === myId;

          messagesBox.innerHTML += `
            <div class="message-item ${mine ? "message-mine" : "message-other"}">
              <div class="message-sender">${msg.sender_id}</div>
              <div>${msg.text}</div>
              <div class="message-time">${msg.created_at}</div>
            </div>
          `;
        });

        statusText.textContent = "메시지 불러오기 완료";
      } catch (error) {
        console.error(error);
        statusText.textContent = "메시지 불러오기 실패";
      }
    }

    loadUsers();
  </script>
</body>
</html>
